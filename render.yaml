# Render Blueprint: NexaAssist API + background worker
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: nexaassist-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_ENABLED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  - type: worker
    name: nexaassist-worker
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_ENABLED
        value: "true"
      - key: DATABASE_URL
        fromService:
          name: nexaassist-api
          type: web
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          name: nexaassist-api
          type: web
          envVarKey: REDIS_URL
      - key: JWT_ACCESS_SECRET
        fromService:
          name: nexaassist-api
          type: web
          envVarKey: JWT_ACCESS_SECRET
      - key: FRONTEND_ORIGIN
        fromService:
          name: nexaassist-api
          type: web
          envVarKey: FRONTEND_ORIGIN
